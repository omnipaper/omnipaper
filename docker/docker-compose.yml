services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: omnipaper
      POSTGRES_PASSWORD: omnipaper
      POSTGRES_DB: omnipaper
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    image: ghcr.io/omnipaper/omnipaper:0
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://omnipaper:omnipaper@postgres:5432/omnipaper
      AUTH_SECRET:
      ENCRYPTION_KEY:

volumes:
  postgres-data:
